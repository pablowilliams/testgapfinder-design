name: Build design report PDF

on:
  push:
    branches: [main]
    paths:
      - "report.md"
      - "figures.py"
      - "build_pdf.py"
      - ".github/workflows/build-pdf.yml"
  pull_request:
    paths:
      - "report.md"
      - "figures.py"
      - "build_pdf.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install reportlab==4.2.2 pypdf==4.3.1

      - name: Build PDF
        run: python build_pdf.py

      - name: Check page count
        run: |
          python - <<'PY'
          from pypdf import PdfReader
          pages = len(PdfReader("TestGapFinder_Design_Report.pdf").pages)
          print(f"pages={pages}")
          assert pages >= 12, f"report must be at least 12 pages (got {pages})"
          PY

      - name: Upload PDF artefact
        uses: actions/upload-artifact@v4
        with:
          name: TestGapFinder_Design_Report
          path: TestGapFinder_Design_Report.pdf
          if-no-files-found: error
          retention-days: 30
